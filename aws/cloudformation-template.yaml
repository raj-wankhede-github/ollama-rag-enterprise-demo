AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Ollama RAG Enterprise Demo on AWS Lambda'

Parameters:
  S3BucketName:
    Type: String
    Description: S3 bucket name for storing documents
  
  LambdaTimeout:
    Type: Number
    Default: 300
    Description: Lambda function timeout in seconds
  
  LambdaMemory:
    Type: Number
    Default: 512
    Description: Lambda function memory in MB

Resources:
  # S3 Bucket for documents
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentBucket.Arn
                  - !Sub '${DocumentBucket.Arn}/*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt EmbeddingsTable.Arn

  # Lambda Function
  RAGLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ollama-rag-function
      Runtime: python3.11
      Handler: src/aws/lambda_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Environment:
        Variables:
          ENV: aws
          AWS_S3_BUCKET: !Ref S3BucketName
          AWS_DYNAMODB_TABLE: !Ref EmbeddingsTable
          LOG_LEVEL: INFO
          VECTOR_DB_TYPE: chroma
          STORAGE_TYPE: s3
      Layers:
        - !GetAtt DependenciesLayer.LayerVersionArn

  # Lambda Layer for dependencies
  DependenciesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: rag-dependencies
      Content:
        S3Bucket: !Ref S3BucketName
        S3Key: lambda-layer.zip
      CompatibleRuntimes:
        - python3.11

  # API Gateway
  RAGApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: ollama-rag-api
      Description: Ollama RAG API

  # API Gateway Query Resource
  QueryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RAGApi
      ParentId: !GetAtt RAGApi.RootResourceId
      PathPart: query

  # API Gateway Query POST Method
  QueryPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RAGApi
      ResourceId: !Ref QueryResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RAGLambdaFunction.Arn}/invocations'

  # API Gateway Ingest Resource
  IngestResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RAGApi
      ParentId: !GetAtt RAGApi.RootResourceId
      PathPart: ingest

  # API Gateway Ingest POST Method
  IngestPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RAGApi
      ResourceId: !Ref IngestResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RAGLambdaFunction.Arn}/invocations'

  # Lambda Permission for API Gateway
  ApiGatewayLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RAGLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RAGApi}/*/*'

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - QueryPostMethod
      - IngestPostMethod
    Properties:
      RestApiId: !Ref RAGApi
      StageName: prod

  # DynamoDB Table for embeddings
  EmbeddingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rag-embeddings
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint
    Value: !Sub 'https://${RAGApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  
  S3BucketName:
    Description: S3 bucket for documents
    Value: !Ref DocumentBucket
  
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt RAGLambdaFunction.Arn
  
  DynamoDBTableName:
    Description: DynamoDB table for embeddings
    Value: !Ref EmbeddingsTable
