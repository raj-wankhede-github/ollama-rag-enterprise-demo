version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - rag_network

  rag-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=docker
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    networks:
      - rag_network
    command: python main.py

volumes:
  ollama_data:

networks:
  rag_network:
    driver: bridge
